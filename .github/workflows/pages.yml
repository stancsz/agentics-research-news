name: Deploy to GitHub Pages

\non:
  push:
    branches: [ main ]
  workflow_dispatch:
\npermissions:
  contents: read
  pages: write
  id-token: write
\nconcurrency:
  group: "pages"
  cancel-in-progress: false
\njobs:
  build:
    runs-on* : ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@av4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploymeny.outputs.page_url }}
    runs-on* : ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4